apiVersion: apps/v1
kind: Deployment
metadata:
  name: greencart-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greencart-backend
  template:
    metadata:
      labels:
        app: greencart-backend
    spec:
      containers:
      - name: backend
        image: lakshyakumar70/greencart-backend:v4
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: greencart-config
        - secretRef:
            name: greencart-secret
